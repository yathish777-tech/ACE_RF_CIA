{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block head %}
<style>
  /* ── ANIMATED BACKGROUND ── */
  .auth-page {
    background:
      linear-gradient(90deg, rgba(6,13,46,0.70), rgba(26,35,126,0.42), rgba(0,0,0,0.48)),
      url("{{ url_for('static', filename='campus_bg.jpg') }}") center / cover no-repeat,
      linear-gradient(135deg, #0d1642 0%, #1a237e 45%, #283593 100%);
    background-size: auto, 108% auto, auto;
    background-position: center, center, center;
    animation: campusPhotoDrift 22s ease-in-out infinite;
    overflow: hidden;
  }
  @keyframes campusPhotoDrift {
    0%, 100% {
      background-size: auto, 108% auto, auto;
      background-position: center, 50% 50%, center;
    }
    50% {
      background-size: auto, 114% auto, auto;
      background-position: center, 54% 48%, center;
    }
  }
  .auth-page::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.16) 45%, transparent 70%);
    transform: translateX(-100%);
    animation: campusLightSweep 8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes campusLightSweep {
    0%, 28% { transform: translateX(-100%); opacity: 0; }
    42% { opacity: 1; }
    70%, 100% { transform: translateX(100%); opacity: 0; }
  }

  /* Floating orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(36px);
    opacity: 0.10;
    animation: floatOrb var(--dur, 12s) ease-in-out infinite alternate;
  }
  .orb-1 { width: 520px; height: 520px; background: #e53935; top: -180px; right: -140px; --dur: 14s; }
  .orb-2 { width: 380px; height: 380px; background: #5c6bc0; bottom: -120px; left: -100px; --dur: 10s; animation-delay: -3s; }
  .orb-3 { width: 260px; height: 260px; background: #1de9b6; top: 40%; left: 10%; --dur: 16s; animation-delay: -6s; }

  @keyframes floatOrb {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, -40px) scale(1.08); }
  }

  /* Particle dots */
  .particles { position: absolute; inset: 0; pointer-events: none; }
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(236,245,255,0.58);
    animation: rise var(--speed, 8s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes rise {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
  }

  /* Grid overlay */
  .auth-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridShift {
    from { background-position: 0 0; }
    to   { background-position: 50px 50px; }
  }

  /* ── CARD ENTRANCE ── */
  .auth-card {
    animation: cardEntrance 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  }

  /* ── LOGO ── */
  .auth-logo img {
    animation: logoBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(26,35,126,0.25);
  }
  @keyframes logoBounce {
    from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .auth-logo h1 { animation: slideInDown 0.5s ease 0.5s both; }
  .auth-logo p  { animation: slideInDown 0.5s ease 0.6s both; }
  @keyframes slideInDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Animated divider */
  .auth-divider {
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #1a237e, #e53935, transparent);
    margin: 0 auto 28px;
    border-radius: 2px;
    animation: expandLine 0.6s ease 0.7s both;
  }
  @keyframes expandLine {
    from { width: 0; opacity: 0; }
    to   { width: 80%; opacity: 1; }
  }

  /* ── FORM STAGGER ── */
  .form-group:nth-of-type(1) { animation: slideInLeft 0.5s ease 0.8s both; }
  .form-group:nth-of-type(2) { animation: slideInLeft 0.5s ease 0.95s both; }
  .remember-row              { animation: slideInLeft 0.5s ease 1.1s both; }
  .btn-login                 { animation: slideInLeft 0.5s ease 1.2s both; }
  .auth-footer               { animation: fadeIn 0.5s ease 1.35s both; }

  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── INPUTS ── */
  .form-control {
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  }
  .form-control:focus {
    border-color: #1a237e;
    box-shadow: 0 0 0 3px rgba(26,35,126,0.14), 0 2px 8px rgba(26,35,126,0.08);
    transform: translateY(-1px);
    outline: none;
  }
  .form-group:focus-within .form-label { color: #1a237e; }
  .form-label { transition: color 0.2s; }

  .input-wrapper { position: relative; }
  .input-wrapper .form-control { padding-right: 42px; }
  .input-icon {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px; opacity: 0.35; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .input-wrapper:focus-within .input-icon {
    opacity: 0.7;
    transform: translateY(-50%) scale(1.1);
  }

  /* ── BUTTON ── */
  .btn-login {
    position: relative; overflow: hidden; letter-spacing: 0.5px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-login::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: translateX(-100%);
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,35,126,0.4); }
  .btn-login:hover::after { animation: shimmer 0.6s ease; }
  .btn-login:active { transform: translateY(0) scale(0.98); }
  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  /* Loading spinner */
  .btn-login.loading { pointer-events: none; opacity: 0.85; }
  .btn-login.loading .btn-text { display: none; }
  .btn-spinner { display: none; }
  .btn-login.loading .btn-spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.6s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PASSWORD TOGGLE ── */
  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    cursor: pointer; font-size: 16px; opacity: 0.4; background: none; border: none;
    padding: 0; transition: opacity 0.2s, transform 0.2s;
  }
  .toggle-pw:hover { opacity: 0.8; transform: translateY(-50%) scale(1.1); }

  /* ── PULSING RING ── */
  .logo-ring {
    position: relative; display: inline-block; margin-bottom: 8px;
  }
  .logo-ring::before, .logo-ring::after {
    content: ''; position: absolute; inset: -8px;
    border-radius: 18px; border: 2px solid rgba(26,35,126,0.2);
    animation: ringPulse 2.4s ease-out infinite;
  }
  .logo-ring::after { inset: -16px; animation-delay: 0.8s; border-color: rgba(26,35,126,0.1); }
  @keyframes ringPulse {
    0%  { transform: scale(0.9); opacity: 0.7; }
    70% { transform: scale(1.1); opacity: 0; }
    100%{ transform: scale(1.1); opacity: 0; }
  }

  input[type="checkbox"] { accent-color: #1a237e; cursor: pointer; }
</style>
{% endblock %}

{% block body %}
<div class="auth-page">
  <!-- Animated orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-ring">
        <img src="{{ url_for('static', filename='ace_logo.jpg') }}"
             alt="College Logo"
             style="width:88px;height:88px;object-fit:contain;display:block;">
      </div>
      <h1>CIA Retest Portal</h1>
      <p>Department Management System</p>
    </div>

    <div class="auth-divider"></div>

    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">

      <div class="form-group">
        <label class="form-label">Email Address <span class="required">*</span></label>
        <div class="input-wrapper">
          <input type="email" name="email" class="form-control"
                 placeholder="your@email.com" required autofocus>
          <span class="input-icon">✉️</span>
        </div>
      </div>

      <div class="form-group" style="margin-top:18px;">
        <label class="form-label">Password <span class="required">*</span></label>
        <div class="input-wrapper">
          <input type="password" name="password" id="passwordField"
                 class="form-control" placeholder="Enter your password" required>
          <button type="button" class="toggle-pw" id="togglePw"
                  aria-label="Toggle password visibility">👁</button>
        </div>
      </div>

      <div class="remember-row d-flex justify-between align-center"
           style="margin:18px 0 22px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" name="remember"> Remember me
        </label>
      </div>

            <div style="text-align:right;margin-bottom:16px;margin-top:-4px;">
        <a href="{{ url_for('auth.forgot_password') }}"
           style="font-size:12.5px;color:#1a237e;font-weight:700;text-decoration:none;">
          🔑 Forgot Password?
        </a>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg btn-login">
        <span class="btn-text">🔐 Login to Portal</span>
        <span class="btn-spinner"></span>
      </button>
    </form>

    <p class="auth-footer text-center"
       style="margin-top:20px;font-size:13px;color:#6b7280;">
      New student?
      <a href="{{ url_for('auth.register') }}"
         style="color:#1a237e;font-weight:700;">Register here</a>
    </p>
  </div>
  {% include '_page_credit.html' %}
</div>

<script>
  /* Floating particles */
  (function() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.setProperty('--speed', (6 + Math.random() * 10) + 's');
      p.style.setProperty('--delay', '-' + (Math.random() * 12) + 's');
      const size = (2 + Math.random() * 3) + 'px';
      p.style.width = size; p.style.height = size;
      container.appendChild(p);
    }
  })();

  /* Password toggle */
  document.getElementById('togglePw').addEventListener('click', function() {
    const f = document.getElementById('passwordField');
    const hidden = f.type === 'password';
    f.type = hidden ? 'text' : 'password';
    this.textContent = hidden ? '🙈' : '👁';
  });

  /* Submit loading state */
  document.getElementById('loginForm').addEventListener('submit', function() {
    this.querySelector('.btn-login').classList.add('loading');
  });
</script>
{% endblock %}
