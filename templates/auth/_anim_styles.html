<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

:root {
  --portfolio-primary: #3B82F6;
  --portfolio-secondary: #8B5CF6;
  --portfolio-accent: #06B6D4;
  --portfolio-ink: #F8FAFC;
  --portfolio-muted: rgba(226, 232, 240, 0.82);
  --portfolio-panel: rgba(15, 23, 42, 0.68);
  --portfolio-panel-strong: rgba(15, 23, 42, 0.82);
  --portfolio-border: rgba(255, 255, 255, 0.18);
}

html { scroll-behavior: smooth; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes softFloat {
  from { transform: translateY(0); }
  to { transform: translateY(-8px); }
}

.auth-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 32px 16px 46px;
  position: relative;
  overflow: hidden auto;
  color: var(--portfolio-ink);
  font-family: 'Poppins', 'Nunito', sans-serif;
  background: url("{{ url_for('static', filename='campus_bg.jpg') }}") center center / cover no-repeat fixed, #020617;
}

.auth-page::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: rgba(2, 6, 23, 0.66);
}

.auth-page::after {
  content: none;
}

.auth-card {
  width: 100%;
  max-width: 480px;
  position: relative;
  z-index: 1;
  padding: 38px 40px;
  color: #0F172A;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid rgba(255, 255, 255, 0.58);
  border-radius: 8px;
  box-shadow: 0 26px 70px rgba(2, 6, 23, 0.34);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  animation: fadeInUp 0.58s ease both;
}

.auth-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 28px;
  right: 28px;
  height: 3px;
  border-radius: 0 0 4px 4px;
  background: linear-gradient(90deg, var(--portfolio-primary), var(--portfolio-secondary), var(--portfolio-accent));
}

.card-corner { display: none; }

.auth-logo {
  text-align: center;
  margin-bottom: 24px;
}

.auth-logo img {
  width: 78px;
  height: 78px;
  object-fit: contain;
  border-radius: 8px;
  margin-bottom: 12px;
  background: #fff;
  box-shadow: 0 10px 24px rgba(59, 130, 246, 0.18);
  transition: transform 0.24s ease, box-shadow 0.24s ease;
}

.auth-logo img:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow: 0 14px 30px rgba(139, 92, 246, 0.22);
}

.auth-logo h1 {
  font-family: 'Poppins', sans-serif;
  font-size: 21px;
  font-weight: 800;
  line-height: 1.2;
  color: #172554;
  letter-spacing: 0;
}

.auth-logo p {
  color: #64748B;
  font-size: 13px;
  margin-top: 5px;
}

.f-group { margin-bottom: 14px; }

.f-label {
  display: block;
  margin-bottom: 6px;
  color: #334155;
  font-size: 12px;
  font-weight: 800;
}

.req { color: #DC2626; }

.f-input {
  width: 100%;
  padding: 11px 13px;
  border: 1.5px solid #CBD5E1;
  border-radius: 8px;
  outline: none;
  background: rgba(248, 250, 252, 0.92);
  color: #0F172A;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.18s ease, background 0.22s ease;
}

.f-input:focus {
  border-color: var(--portfolio-primary);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.16);
  transform: translateY(-1px);
}

.f-input.is-err {
  border-color: #DC2626;
  background: #FFF7F7;
}

.f-err {
  margin-top: 4px;
  color: #DC2626;
  font-size: 11px;
  font-weight: 800;
}

.pw-wrap { position: relative; }

.pw-eye {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  border: 0;
  background: transparent;
  color: #64748B;
  cursor: pointer;
  font-size: 13px;
  font-weight: 800;
  padding: 4px;
  transition: color 0.2s ease, transform 0.2s ease;
}

.pw-eye:hover {
  color: var(--portfolio-primary);
  transform: translateY(-50%) scale(1.05);
}

.btn-auth,
.f-btn {
  width: 100%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 18px;
  border: 0;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--portfolio-primary), var(--portfolio-secondary));
  box-shadow: 0 14px 28px rgba(59, 130, 246, 0.26);
  transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
}

.btn-auth:hover,
.f-btn:hover {
  transform: translateY(-2px);
  filter: saturate(1.08);
  box-shadow: 0 18px 34px rgba(139, 92, 246, 0.30);
}

.btn-auth:active,
.f-btn:active { transform: translateY(0) scale(0.99); }

.auth-footer-link {
  margin-top: 15px;
  text-align: center;
  color: #64748B;
  font-size: 12.5px;
}

.auth-footer-link a {
  color: var(--portfolio-primary);
  font-weight: 800;
  text-decoration: none;
}

.auth-footer-link a:hover { color: var(--portfolio-secondary); }

.fi1,
.fi2,
.fi3,
.fi4,
.fi5,
.fi6 {
  animation: fadeInUp 0.48s ease both;
}

.fi2 { animation-delay: 0.05s; }
.fi3 { animation-delay: 0.1s; }
.fi4 { animation-delay: 0.15s; }
.fi5 { animation-delay: 0.2s; }
.fi6 { animation-delay: 0.25s; }

.otp-inputs {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 16px 0;
}

.otp-box {
  width: 52px;
  height: 60px;
  text-align: center;
  color: #172554;
  border: 2px solid #CBD5E1;
  border-radius: 8px;
  outline: none;
  background: #F8FAFC;
  font-size: 26px;
  font-weight: 800;
  transition: border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
}

.otp-box:focus {
  border-color: var(--portfolio-primary);
  transform: scale(1.05);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
  background: #fff;
}

@media (max-width: 760px) {
  .auth-page {
    padding: 24px 14px 36px;
    background-attachment: scroll;
    background-position: center top;
  }
}

@media (max-width: 520px) {
  .auth-card {
    padding: 30px 20px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
