{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block head %}{% include "auth/_anim_styles.html" %}{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="ring1"></div><div class="ring2"></div>
  <div id="pts"></div>
  <div class="auth-card">
    <div class="card-corner cc-tl"></div><div class="card-corner cc-br"></div>
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='ace_logo.jpg') }}" alt="ACE"
           onerror="this.outerHTML='<div style=\'width:72px;height:72px;background:linear-gradient(135deg,#1a237e,#e53935);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:12px;\'>🔑</div>'">
      <h1>Set New Password</h1>
      <p>Choose a strong password</p>
    </div>
    <form method="POST">
      <div class="f-group fi1">
        <label class="f-label">New Password <span class="req">*</span></label>
        <div class="pw-wrap">
          <input type="password" name="password" id="pw1" class="f-input" placeholder="Min 6 characters" required minlength="6" style="padding-right:40px" autofocus>
          <button type="button" class="pw-eye" onclick="togglePw('pw1',this)">👁️</button>
        </div>
      </div>
      <div class="f-group fi2">
        <label class="f-label">Confirm Password <span class="req">*</span></label>
        <div class="pw-wrap">
          <input type="password" name="confirm_password" id="pw2" class="f-input" placeholder="Re-enter password" required style="padding-right:40px">
          <button type="button" class="pw-eye" onclick="togglePw('pw2',this)">👁️</button>
        </div>
      </div>
      <div class="fi3" style="margin-top:6px;">
        <button type="submit" class="btn-auth">🔒 Reset Password</button>
      </div>
    </form>
    <p class="auth-footer-link fi4"><a href="{{ url_for('auth.login') }}">← Back to Login</a></p>
  </div>
</div>
<script>
(function(){const c=document.getElementById('pts');for(let i=0;i<12;i++){const p=document.createElement('div');p.className='particle';const sz=Math.random()*4+2;p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:-10px;background:rgba(255,255,255,.5);animation-duration:${7+Math.random()*9}s;animation-delay:${Math.random()*8}s;`;c.appendChild(p);}})();
function togglePw(id,btn){const f=document.getElementById(id);f.type=f.type==='password'?'text':'password';btn.textContent=f.type==='password'?'👁️':'🙈';}
</script>
{% endblock %}
