{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block head %}{% include "auth/_anim_styles.html" %}{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div class="card-corner cc-tl"></div><div class="card-corner cc-br"></div>
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='ace_logo.jpg') }}" alt="ACE"
           onerror="this.outerHTML='<div style=\'width:72px;height:72px;background:linear-gradient(135deg,#1a237e,#e53935);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:12px;\'>🔐</div>'">
      <h1>Forgot Password</h1>
      <p>Enter your email — we'll send an OTP</p>
    </div>
    <form method="POST">
      <div class="f-group fi1">
        <label class="f-label">📧 Registered Email <span class="req">*</span></label>
        <input type="email" name="email" class="f-input" placeholder="your@email.com" required autofocus>
      </div>
      <div class="fi2" style="margin-top:6px;">
        <button type="submit" class="btn-auth">📨 Send OTP</button>
      </div>
    </form>
    <p class="auth-footer-link fi3"><a href="{{ url_for('auth.login') }}">← Back to Login</a></p>
  </div>
</div>
{% endblock %}
